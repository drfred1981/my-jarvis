---
# Secrets for Jarvis services (API tokens, credentials)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jarvis-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: jarvis-secrets
    creationPolicy: Owner
  data:
    # Discord
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: jarvis
        property: DISCORD_BOT_TOKEN

    # Home Assistant
    - secretKey: HA_URL
      remoteRef:
        key: jarvis
        property: HA_URL
    - secretKey: HA_TOKEN
      remoteRef:
        key: jarvis
        property: HA_TOKEN

    # Git
    - secretKey: GIT_REPOS
      remoteRef:
        key: jarvis
        property: GIT_REPOS
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: jarvis
        property: GITHUB_TOKEN

    # Grafana / Prometheus
    - secretKey: GRAFANA_URL
      remoteRef:
        key: jarvis
        property: GRAFANA_URL
    - secretKey: GRAFANA_TOKEN
      remoteRef:
        key: jarvis
        property: GRAFANA_TOKEN
    - secretKey: PROMETHEUS_URL
      remoteRef:
        key: jarvis
        property: PROMETHEUS_URL

    # Planka
    - secretKey: PLANKA_URL
      remoteRef:
        key: jarvis
        property: PLANKA_URL
    - secretKey: PLANKA_USER
      remoteRef:
        key: jarvis
        property: PLANKA_USER
    - secretKey: PLANKA_PASSWORD
      remoteRef:
        key: jarvis
        property: PLANKA_PASSWORD

    # Miniflux
    - secretKey: MINIFLUX_URL
      remoteRef:
        key: jarvis
        property: MINIFLUX_URL
    - secretKey: MINIFLUX_API_KEY
      remoteRef:
        key: jarvis
        property: MINIFLUX_API_KEY

    # Immich
    - secretKey: IMMICH_URL
      remoteRef:
        key: jarvis
        property: IMMICH_URL
    - secretKey: IMMICH_API_KEY
      remoteRef:
        key: jarvis
        property: IMMICH_API_KEY

    # Karakeep
    - secretKey: KARAKEEP_URL
      remoteRef:
        key: jarvis
        property: KARAKEEP_URL
    - secretKey: KARAKEEP_API_KEY
      remoteRef:
        key: jarvis
        property: KARAKEEP_API_KEY

    # Music Assistant
    - secretKey: MUSIC_ASSISTANT_URL
      remoteRef:
        key: jarvis
        property: MUSIC_ASSISTANT_URL

    # Synology Chat (optional)
    - secretKey: SYNOLOGY_CHAT_WEBHOOK_URL
      remoteRef:
        key: jarvis
        property: SYNOLOGY_CHAT_WEBHOOK_URL

    # Discord channel filter (optional)
    - secretKey: DISCORD_CHANNEL_IDS
      remoteRef:
        key: jarvis
        property: DISCORD_CHANNEL_IDS

---
# Kubeconfig (separate secret for volume mount)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jarvis-kubeconfig
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: jarvis-kubeconfig
    creationPolicy: Owner
  data:
    - secretKey: config
      remoteRef:
        key: jarvis-kubeconfig
        property: kubeconfig
